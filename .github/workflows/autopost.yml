name: Beauty Encyclopedia Auto Post

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run auto post script
      env:
        LIVEDOOR_ID: ${{ secrets.LIVEDOOR_ID }}
        LIVEDOOR_API_KEY: ${{ secrets.LIVEDOOR_API_KEY }}
        LIVEDOOR_BLOG_ID: ranking000-w6crxelo
        LIVEDOOR_CATEGORY: 美女図鑑
        DMM_API_ID: ${{ secrets.DMM_API_ID }}
        DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add state.json history.txt queue_aru18.json queue_ranking_net.json queue_reinasex.json
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "Update state and history [skip ci]"
          git pull --rebase origin master
          git push
        )
