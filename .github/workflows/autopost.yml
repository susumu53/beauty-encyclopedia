name: Beauty Encyclopedia Auto Post

on:
  schedule:
    - cron: '0 * * * *' # 1時間おきに実行
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/checkout@v3
      # 実際には python setup が必要ですが、簡易化のため checkout を流用せず actions/setup-python を使います
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run auto post script
      env:
        LIVEDOOR_ID: ${{ secrets.LIVEDOOR_ID }}
        LIVEDOOR_API_KEY: ${{ secrets.LIVEDOOR_API_KEY }}
        LIVEDOOR_BLOG_ID: ranking000-w6crxelo
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add state.json history.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update state and history" && git push)
