name: Beauty Encyclopedia Auto Post

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run auto post script
      env:
        LIVEDOOR_ID: ${{ secrets.LIVEDOOR_ID }}
        LIVEDOOR_API_KEY: ${{ secrets.LIVEDOOR_API_KEY }}
        LIVEDOOR_BLOG_ID: ranking000-w6crxelo
        LIVEDOOR_CATEGORY: 美女図鑑
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add state.json history.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update state and history [skip ci]" && git push)
