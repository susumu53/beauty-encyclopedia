name: Beauty Encyclopedia Auto Post
on:
  schedule:
      - cron: '0 0 * * *'
        workflow_dispatch:
        jobs:
          post:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v3
                              - uses: actions/setup-python@v4
                                      with:
                                                python-version: '3.9'
                                                      - run: python main.py
                                                              env:
                                                                        LIVEDOOR_ID: ${{ secrets.LIVEDOOR_ID }}
                                                                                  LIVEDOOR_API_KEY: ${{ secrets.LIVEDOOR_API_KEY }}
                                                                                  
